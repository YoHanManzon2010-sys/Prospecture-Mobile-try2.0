<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chemistry Quiz</title>

<style>
/* ===== YOUR UI (UNCHANGED) ===== */
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  background:black;
}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#00d4ff 1px, transparent 1px),
    radial-gradient(#7b2ff7 1px, transparent 1px);
  background-size:100px 100px, 150px 150px, 200px 200px;
  animation:moveStars 60s linear infinite;
  opacity:0.3;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

.quiz-container{width:900px;text-align:center;z-index:1;}
.counter{font-size:20px;margin-bottom:20px;}
.question-box{
  padding:50px;margin-bottom:50px;border-radius:40px;
  border:3px solid #00d4ff;box-shadow:0 0 30px #00d4ff;
  background:rgba(255,255,255,0.05);font-size:28px;
}
.options{display:grid;grid-template-columns:1fr 1fr;gap:30px;}
.option{
  padding:25px;font-size:20px;border-radius:40px;
  border:2px solid #7b2ff7;cursor:pointer;transition:0.3s;
  background:rgba(255,255,255,0.05);
}
.option:hover{transform:scale(1.05);}
.correct{ background:#00c853 !important; }
.wrong{ background:#d50000 !important; }

.back-btn{
position:absolute;left:20px;top:18px;width:60px;height:60px;
border-radius:50%;border:none;background:rgba(255,255,255,0.12);
color:#fff;font-size:36px;cursor:pointer;z-index:10;
display:flex;align-items:center;justify-content:center;transition:0.3s;
}
.back-btn:hover{transform:scale(1.1);}

.final-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:black;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
}
.final-screen h1{ font-size:50px; }
.final-screen h2{ font-size:30px; }
.rank{ font-size:28px;margin-top:10px;color:#00d4ff; }
.final-buttons{ margin-top:40px; }
.final-buttons button{
  margin:10px;padding:15px 40px;font-size:18px;
  border-radius:40px;border:none;cursor:pointer;
}
.retake{ background: linear-gradient(45deg, #00d4ff, #7b2ff7); color: black; }
.home{ background: linear-gradient(45deg, #7b2ff7, #00d4ff); color: white; }

/* Responsive Styles */
@media (max-width: 768px) {
  .quiz-container {
    width: 95%;
    padding: 15px;
  }
  
  .counter {
    font-size: 16px;
    margin-bottom: 15px;
  }
  
  .question-box {
    padding: 25px;
    margin-bottom: 30px;
    border-radius: 25px;
    font-size: 20px;
  }
  
  .options {
    grid-template-columns: 1fr;
    gap: 15px;
  }
  
  .option {
    padding: 18px;
    font-size: 16px;
    border-radius: 25px;
  }
  
  .back-btn {
    left: 10px;
    top: 10px;
    width: 45px;
    height: 45px;
    font-size: 24px;
  }
}

@media (max-width: 480px) {
  .quiz-container {
    width: 100%;
    padding: 10px;
  }
  
  .question-box {
    padding: 18px;
    margin-bottom: 20px;
    border-radius: 20px;
    font-size: 16px;
  }
  
  .option {
    padding: 14px;
    font-size: 14px;
    border-radius: 20px;
  }
  
  .counter {
    font-size: 14px;
  }
  
  .back-btn {
    left: 8px;
    top: 8px;
    width: 40px;
    height: 40px;
    font-size: 20px;
  }
  
  .final-screen h1 {
    font-size: 32px;
  }
  
  .final-screen h2 {
    font-size: 20px;
  }
  
  .rank {
    font-size: 20px;
  }
  
  .final-buttons button {
    padding: 12px 25px;
    font-size: 14px;
    margin: 8px;
  }
}

/* Touch device optimizations */
@media (hover: none) and (pointer: coarse) {
  .option:hover {
    transform: none;
  }
  
  .option:active {
    transform: scale(0.98);
  }
}
</style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='science.html'">←</button>

<div class="quiz-container">
  <div class="counter" id="counter"></div>
  <div class="question-box" id="question"></div>
  <div class="options" id="options"></div>
</div>

<script>

// ✅ IMPORTANT — DEFINE STORAGE KEY
const highScoreKey = "chemHighScore";

const questionBank = [
{q:"Chemical symbol for Oxygen?",a:["O","Ox","Og","Om"],correct:0},
{q:"H2O is?",a:["Water","Salt","Oxygen","Hydrogen"],correct:0},
{q:"pH less than 7 is?",a:["Acid","Base","Neutral","Salt"],correct:0},
{q:"Periodic table contains?",a:["Elements","Cells","Planets","Organs"],correct:0},
{q:"Smallest particle of element?",a:["Atom","Cell","Molecule","Ion"],correct:0},
{q:"NaCl is?",a:["Salt","Water","Acid","Gas"],correct:0},
{q:"State of matter with definite shape?",a:["Solid","Liquid","Gas","Plasma"],correct:0},
{q:"Gas used in balloons?",a:["Helium","Oxygen","Nitrogen","Carbon"],correct:0},
{q:"Chemical reaction produces?",a:["New substance","Same substance","Nothing","Energy only"],correct:0},
{q:"Atomic number equals?",a:["Protons","Neutrons","Electrons","Mass"],correct:0},
{q:"CO2 is?",a:["Carbon dioxide","Carbon monoxide","Oxygen","Hydrogen"],correct:0},
{q:"Burning is example of?",a:["Chemical change","Physical change","Melting","Freezing"],correct:0},
{q:"Acids taste?",a:["Sour","Sweet","Bitter","Salty"],correct:0},
{q:"Base turns litmus paper?",a:["Blue","Red","Green","Yellow"],correct:0},
{q:"Matter is anything that has?",a:["Mass & volume","Energy","Light","Force"],correct:0},
{q:"Evaporation is?",a:["Liquid to gas","Solid to liquid","Gas to liquid","Solid to gas"],correct:0},
{q:"Element with atomic number 1?",a:["Hydrogen","Helium","Oxygen","Carbon"],correct:0},
{q:"Gas essential for combustion?",a:["Oxygen","Hydrogen","Nitrogen","Helium"],correct:0},
{q:"Mixture can be separated by?",a:["Physical means","Chemical means","Burning","Fusion"],correct:0},
{q:"Boiling point of water?",a:["100°C","90°C","80°C","70°C"],correct:0},
{q:"Table salt formula?",a:["NaCl","KCl","H2O","CO2"],correct:0},
{q:"Neutral pH value?",a:["7","1","14","0"],correct:0},
{q:"Protons are?",a:["Positive","Negative","Neutral","None"],correct:0},
{q:"Electrons are?",a:["Negative","Positive","Neutral","Heavy"],correct:0},
{q:"Neutrons have?",a:["No charge","Positive","Negative","Energy"],correct:0},
{q:"Rusting is?",a:["Oxidation","Freezing","Melting","Boiling"],correct:0},
{q:"Periodic table arranged by?",a:["Atomic number","Color","Mass only","Size"],correct:0},
{q:"Chemical bonds join?",a:["Atoms","Cells","Planets","Organs"],correct:0},
{q:"Water is example of?",a:["Compound","Element","Mixture","Ion"],correct:0},
{q:"Gas at room temperature?",a:["Oxygen","Iron","Gold","Silver"],correct:0}
];

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

let quiz = shuffle([...questionBank]).slice(0,10);
let current=0;
let score=0;

function loadQuestion(){
  if(current>=quiz.length){ showFinal(); return; }

  document.getElementById("counter").innerText =
    (current+1) + " / " + quiz.length;

  let q = quiz[current];
  document.getElementById("question").innerText=q.q;

  let options = shuffle([...q.a]);
  let correctAnswer = q.a[q.correct];
  const opts=document.getElementById("options");
  opts.innerHTML="";

  options.forEach(choice=>{
    const btn=document.createElement("div");
    btn.className="option";
    btn.innerText=choice;

    btn.onclick=function(){
      if(choice===correctAnswer){ btn.classList.add("correct"); score++; }
      else{ btn.classList.add("wrong"); }

      setTimeout(()=>{ current++; loadQuestion(); },500);
    };

    opts.appendChild(btn);
  });
}

function showFinal(){

  let savedHigh = parseInt(localStorage.getItem(highScoreKey)) || 0;

  if(score > savedHigh){
    localStorage.setItem(highScoreKey, score);
    savedHigh = score;
  }

  let ranking="";
  if(score>=9) ranking="🌟 Excellent!";
  else if(score>=7) ranking="👍 Great Job!";
  else if(score>=5) ranking="🙂 Good Effort!";
  else ranking="📘 Keep Practicing!";

  document.body.innerHTML=`
    <div class="final-screen">
      <h1>🎉 Good Job! 🎉</h1>
      <h2>Your Final Score: ${score} / ${quiz.length}</h2>
      <h2>🏆 High Score: ${savedHigh}</h2>
      <div class="rank">${ranking}</div>
      <div class="final-buttons">
        <button class="retake" onclick="location.reload()">Retake Quiz</button>
        <button class="home" onclick="window.location.href='science.html'">Go Back to Topics</button>
      </div>
    </div>
  `;
}

loadQuestion();
</script>
</body>
</html>
