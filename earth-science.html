<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chemistry Quiz</title>

<style>
/* ===== YOUR UI (UNCHANGED) ===== */
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  background:black;
}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#00d4ff 1px, transparent 1px),
    radial-gradient(#7b2ff7 1px, transparent 1px);
  background-size:100px 100px, 150px 150px, 200px 200px;
  animation:moveStars 60s linear infinite;
  opacity:0.3;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

.quiz-container{width:900px;text-align:center;z-index:1;}
.counter{font-size:20px;margin-bottom:20px;}
.question-box{
  padding:50px;margin-bottom:50px;border-radius:40px;
  border:3px solid #00d4ff;box-shadow:0 0 30px #00d4ff;
  background:rgba(255,255,255,0.05);font-size:28px;
}
.options{display:grid;grid-template-columns:1fr 1fr;gap:30px;}
.option{
  padding:25px;font-size:20px;border-radius:40px;
  border:2px solid #7b2ff7;cursor:pointer;transition:0.3s;
  background:rgba(255,255,255,0.05);
}
.option:hover{transform:scale(1.05);}
.correct{ background:#00c853 !important; }
.wrong{ background:#d50000 !important; }

.back-btn{
position:absolute;left:20px;top:18px;width:60px;height:60px;
border-radius:50%;border:none;background:rgba(255,255,255,0.12);
color:#fff;font-size:36px;cursor:pointer;z-index:10;
display:flex;align-items:center;justify-content:center;transition:0.3s;
}
.back-btn:hover{transform:scale(1.1);}

.final-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:black;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
}
.final-screen h1{ font-size:50px; }
.final-screen h2{ font-size:30px; }
.rank{ font-size:28px;margin-top:10px;color:#00d4ff; }
.final-buttons{ margin-top:40px; }
.final-buttons button{
  margin:10px;padding:15px 40px;font-size:18px;
  border-radius:40px;border:none;cursor:pointer;
}
.retake{ background: linear-gradient(45deg, #00d4ff, #7b2ff7); color: black; }
.home{ background: linear-gradient(45deg, #7b2ff7, #00d4ff); color: white; }

/* Responsive Styles */
@media (max-width: 768px) {
  .quiz-container {
    width: 95%;
    padding: 15px;
  }
  
  .counter {
    font-size: 16px;
    margin-bottom: 15px;
  }
  
  .question-box {
    padding: 25px;
    margin-bottom: 30px;
    border-radius: 25px;
    font-size: 20px;
  }
  
  .options {
    grid-template-columns: 1fr;
    gap: 15px;
  }
  
  .option {
    padding: 18px;
    font-size: 16px;
    border-radius: 25px;
  }
  
  .back-btn {
    left: 10px;
    top: 10px;
    width: 45px;
    height: 45px;
    font-size: 24px;
  }
}

@media (max-width: 480px) {
  .quiz-container {
    width: 100%;
    padding: 10px;
  }
  
  .question-box {
    padding: 18px;
    margin-bottom: 20px;
    border-radius: 20px;
    font-size: 16px;
  }
  
  .option {
    padding: 14px;
    font-size: 14px;
    border-radius: 20px;
  }
  
  .counter {
    font-size: 14px;
  }
  
  .back-btn {
    left: 8px;
    top: 8px;
    width: 40px;
    height: 40px;
    font-size: 20px;
  }
  
  .final-screen h1 {
    font-size: 32px;
  }
  
  .final-screen h2 {
    font-size: 20px;
  }
  
  .rank {
    font-size: 20px;
  }
  
  .final-buttons button {
    padding: 12px 25px;
    font-size: 14px;
    margin: 8px;
  }
}

/* Touch device optimizations */
@media (hover: none) and (pointer: coarse) {
  .option:hover {
    transform: none;
  }
  
  .option:active {
    transform: scale(0.98);
  }
}
</style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='science.html'">←</button>

<div class="quiz-container">
  <div class="counter" id="counter"></div>
  <div class="question-box" id="question"></div>
  <div class="options" id="options"></div>
</div>

<script>

// ✅ IMPORTANT — DEFINE STORAGE KEY
const highScoreKey = "earthHighScore";

const questionBank = [
{q:"Center of solar system?",a:["Sun","Earth","Moon","Mars"],correct:0},
{q:"Closest planet to Sun?",a:["Mercury","Venus","Earth","Mars"],correct:0},
{q:"Layer we live on?",a:["Crust","Mantle","Core","Outer core"],correct:0},
{q:"Rock formed from lava?",a:["Igneous","Sedimentary","Metamorphic","Fossil"],correct:0},
{q:"Water cycle includes?",a:["Evaporation","Digestion","Respiration","Fusion"],correct:0},
{q:"Earth rotates on its?",a:["Axis","Orbit","Pole","Core"],correct:0},
{q:"Natural satellite of Earth?",a:["Moon","Sun","Mars","Venus"],correct:0},
{q:"Molten rock below surface?",a:["Magma","Lava","Rock","Soil"],correct:0},
{q:"Weather occurs in?",a:["Troposphere","Stratosphere","Mesosphere","Core"],correct:0},
{q:"Study of rocks?",a:["Geology","Biology","Physics","Chemistry"],correct:0},
{q:"Largest ocean?",a:["Pacific","Atlantic","Indian","Arctic"],correct:0},
{q:"Earth’s shape is?",a:["Oblate spheroid","Flat","Cube","Triangle"],correct:0},
{q:"Earth revolves around?",a:["Sun","Moon","Mars","Jupiter"],correct:0},
{q:"Earthquake is caused by?",a:["Plate movement","Wind","Rain","Sun"],correct:0},
{q:"Gas protecting Earth?",a:["Ozone","Hydrogen","Carbon","Helium"],correct:0},
{q:"Fossils are found in?",a:["Sedimentary rocks","Igneous rocks","Core","Mantle"],correct:0},
{q:"Instrument measuring earthquakes?",a:["Seismograph","Barometer","Thermometer","Voltmeter"],correct:0},
{q:"Rain forms from?",a:["Condensation","Evaporation","Melting","Freezing"],correct:0},
{q:"Inner layer of Earth?",a:["Core","Crust","Mantle","Surface"],correct:0},
{q:"Solar eclipse occurs when?",a:["Moon blocks Sun","Earth blocks Sun","Sun blocks Moon","Mars blocks Sun"],correct:0},
{q:"Minerals are?",a:["Natural solids","Liquids","Gases","Plastics"],correct:0},
{q:"Wind erosion moves?",a:["Soil","Sun","Moon","Stars"],correct:0},
{q:"Volcano erupts from?",a:["Magma","Rain","Wind","Cloud"],correct:0},
{q:"Earth’s atmosphere is made of?",a:["Gases","Water","Rock","Metal"],correct:0},
{q:"Tsunami caused by?",a:["Underwater quake","Wind","Sun","Rain"],correct:0},
{q:"Earth tilts at about?",a:["23.5°","45°","90°","10°"],correct:0},
{q:"Galaxy we belong to?",a:["Milky Way","Andromeda","Orion","Pegasus"],correct:0},
{q:"Rock cycle changes?",a:["Rocks","Planets","Stars","Water"],correct:0},
{q:"Day and night caused by?",a:["Rotation","Revolution","Eclipse","Rain"],correct:0},
{q:"Outer space study?",a:["Astronomy","Biology","Chemistry","Physics"],correct:0}
];


function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

let quiz = shuffle([...questionBank]).slice(0,10);
let current=0;
let score=0;

function loadQuestion(){
  if(current>=quiz.length){ showFinal(); return; }

  document.getElementById("counter").innerText =
    (current+1) + " / " + quiz.length;

  let q = quiz[current];
  document.getElementById("question").innerText=q.q;

  let options = shuffle([...q.a]);
  let correctAnswer = q.a[q.correct];
  const opts=document.getElementById("options");
  opts.innerHTML="";

  options.forEach(choice=>{
    const btn=document.createElement("div");
    btn.className="option";
    btn.innerText=choice;

    btn.onclick=function(){
      if(choice===correctAnswer){ btn.classList.add("correct"); score++; }
      else{ btn.classList.add("wrong"); }

      setTimeout(()=>{ current++; loadQuestion(); },500);
    };

    opts.appendChild(btn);
  });
}

function showFinal(){

  let savedHigh = parseInt(localStorage.getItem(highScoreKey)) || 0;

  if(score > savedHigh){
    localStorage.setItem(highScoreKey, score);
    savedHigh = score;
  }

  let ranking="";
  if(score>=9) ranking="🌟 Excellent!";
  else if(score>=7) ranking="👍 Great Job!";
  else if(score>=5) ranking="🙂 Good Effort!";
  else ranking="📘 Keep Practicing!";

  document.body.innerHTML=`
    <div class="final-screen">
      <h1>🎉 Good Job! 🎉</h1>
      <h2>Your Final Score: ${score} / ${quiz.length}</h2>
      <h2>🏆 High Score: ${savedHigh}</h2>
      <div class="rank">${ranking}</div>
      <div class="final-buttons">
        <button class="retake" onclick="location.reload()">Retake Quiz</button>
        <button class="home" onclick="window.location.href='science.html'">Go Back to Topics</button>
      </div>
    </div>
  `;
}

loadQuestion();
</script>
</body>
</html>
